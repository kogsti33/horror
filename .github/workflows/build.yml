name: Build Mod

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Gradle 2.14.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-2.14.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-2.14.1/bin" >> $GITHUB_PATH

      - name: Generate wrapper
        run: gradle wrapper --gradle-version 2.14.1

      - name: Fix Minecraft asset cache
        run: |
          python3 << 'EOF'
          import urllib.request, json, os
          C = os.path.expanduser("~/.gradle/caches/minecraft")
          os.makedirs(f"{C}/assets/indexes", exist_ok=True)
          os.makedirs(f"{C}/versions/1.7.10", exist_ok=True)
          os.makedirs(f"{C}/jars", exist_ok=True)

          with urllib.request.urlopen("https://launchermeta.mojang.com/mc/game/version_manifest.json") as r:
              m = json.load(r)
          url = next(v["url"] for v in m["versions"] if v["id"] == "1.7.10")
          with urllib.request.urlopen(url) as r:
              d = r.read()
          open(f"{C}/versions/1.7.10/1.7.10.json","wb").write(d)
          vj = json.loads(d)

          with urllib.request.urlopen(vj["assetIndex"]["url"]) as r:
              open(f"{C}/assets/indexes/1.7.10.json","wb").write(r.read())

          client_url = vj["downloads"]["client"]["url"]
          urllib.request.urlretrieve(client_url, f"{C}/jars/minecraft.jar")
          urllib.request.urlretrieve(client_url, f"{C}/versions/1.7.10/1.7.10.jar")

          server_url = vj["downloads"]["server"]["url"]
          urllib.request.urlretrieve(server_url, f"{C}/jars/minecraft_server.jar")
          urllib.request.urlretrieve(server_url, f"{C}/versions/1.7.10/minecraft_server.1.7.10.jar")

          print("Done!")
          print(f"client: {os.path.exists(C+'/versions/1.7.10/1.7.10.jar')}")
          print(f"server: {os.path.exists(C+'/versions/1.7.10/minecraft_server.1.7.10.jar')}")
          EOF

      - name: Build
        run: ./gradlew setupDecompWorkspace build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: RealityFracture
          path: build/libs/*.jar
